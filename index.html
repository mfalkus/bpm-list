<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>BPM List</title>
    <link rel="icon" href="icons/treble-clef.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="header">
        <div class="header__brand">
          <div class="header__title-row">
            <svg
              class="site-logo"
              viewBox="0 0 512 512"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="currentColor"
                d="m238.75 138.492l18.147-18.829c.898-21.472 9.107-59.37 26.166-60.771c6.994.097 14.566 5.833 15.742 16.021c3.25 28.145-11.833 40.563-29.072 57.372l-31.408 32.586l-.037-.038c-28.467 31.447-65.355 70.37-69.772 106.973c-5.588 53.77 31.264 108.42 87.149 105.693l-3.178-18.066c-37.522-4.905-69.771-43.77-56.711-81.312c23.275-60.413 75.664-92.822 116.333-148.022c11.474-15.574 14.575-46.945 11.815-63.128c-2.76-16.184-14.345-43.066-32.059-45.017c-34.714-4.59-60.724 62.476-53.114 116.538zm25.667 75.896l-15.508 15.248c.542 2.775 1.166 6.185 2.088 12.14c-34.017 21.505-36.576 66.707-12.186 90.96c5.177 5.31 15.165-2.767 10.104-8.674c-10.971-19.786-12.097-44.028 5.742-57.137c8.78 50.539 24.627 117.16 30.164 170.895c.364 3.535-6.593 10.614-9.973 11.396c0-22.091-17.908-40-40-40c-22.09 0-40 17.909-40 40c.017 20.193 15.266 36.007 35.123 39.668c42.008 7.745 78.659-17.935 72.76-53.16c-8.793-59.062-21.986-121.007-30.857-175.32c12.066-1.253 28.875 5.169 36.428 12.847c8.575 9.297 12.95 22.35 11.982 32.787c-.924 9.96-7.425 20.992-17.06 30.381l3.662 20.776c17.346-12.583 35.117-30.185 36.94-49.844c1.518-16.352-5.01-40.324-18.08-52.273c-16.885-15.437-38.313-18.553-57.349-16.612c-2.004-13.065-3.018-18.039-3.98-24.078"
              />
            </svg>
            <h1 id="gig-name-display" class="header__gig-name">Your Gig</h1>
            <input
              type="text"
              id="gig-name-input"
              class="header__gig-name-input"
              maxlength="80"
              aria-label="Gig name"
              hidden
            />
            <button
              type="button"
              id="edit-gig-name"
              class="edit-btn"
              aria-label="Rename gig"
              title="Rename gig"
            >
              <span class="pencil-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="header__tagline-row">
            <p id="gig-desc-display" class="header__tagline">
              Your gig setlist with tempo reference.
            </p>
            <input
              type="text"
              id="gig-desc-input"
              class="header__tagline-input"
              maxlength="120"
              aria-label="Gig description"
              hidden
            />
            <button
              type="button"
              id="edit-gig-desc"
              class="edit-btn edit-btn--desc"
              aria-label="Edit description"
              title="Edit description"
            >
              <span class="pencil-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <div class="header__controls">
          <label class="volume-control" title="Metronome volume">
            <span class="volume-icon" aria-hidden="true"></span>
            <input
              type="range"
              id="volume-slider"
              class="volume-slider"
              min="0"
              max="100"
              value="80"
              aria-label="Metronome volume"
            />
          </label>
          <button
            type="button"
            id="gig-time-btn"
            class="btn btn--ghost gig-time-btn"
            aria-pressed="false"
            title="Lock setlist for live performance"
          >
            Gig Time
          </button>
          <button
            type="button"
            id="theme-toggle"
            class="icon-btn"
            aria-label="Toggle light/dark mode"
            title="Toggle theme"
          >
            <span class="theme-icon theme-icon--light" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon--dark" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <main>
        <div id="add-bar" class="add-bar">
          <form id="add-form" class="add-form" autocomplete="off">
            <input
              type="text"
              id="new-title"
              class="input"
              placeholder="Song title or break label"
              maxlength="120"
            />
            <input
              type="number"
              id="new-bpm"
              class="input input--bpm"
              placeholder="BPM"
              min="20"
              max="400"
              step="1"
            />
            <button type="submit" value="song" class="btn btn--primary">
              + Song
            </button>
            <button type="submit" value="break" class="btn btn--ghost">
              + Break
            </button>
          </form>
        </div>

        <div id="empty-state" class="empty-state" hidden>
          <p>No songs yet. Add your first tune above.</p>
        </div>

        <ul id="song-list" class="song-list" aria-label="Song list"></ul>
      </main>

      <footer class="footer">
        <p>
          <kbd>↑</kbd><kbd>↓</kbd> select song &middot; <kbd>Space</kbd> play/stop
          &middot; <kbd>T</kbd> tap tempo
        </p>
        <button type="button" id="copy-link-btn" class="footer__copy-link">
          Copy share link
        </button>
      </footer>
    </div>

    <template id="song-row-template">
      <li class="song-row" data-id="">
        <span class="song-row__num" aria-hidden="true"></span>
        <input
          type="text"
          class="input song-row__title"
          placeholder="Song title"
          maxlength="120"
          aria-label="Song title"
        />
        <span class="song-row__title-text"></span>
        <div class="song-row__bpm-group">
          <input
            type="number"
            class="input input--bpm song-row__bpm"
            placeholder="BPM"
            min="20"
            max="400"
            step="1"
            aria-label="Beats per minute"
          />
          <span class="song-row__bpm-text" aria-hidden="true"></span>
          <button
            type="button"
            class="btn btn--ghost song-row__tap"
            title="Tap along to the song to detect tempo"
          >
            Tap
          </button>
        </div>
        <div class="song-row__actions">
          <button
            type="button"
            class="btn btn--play song-row__play"
            aria-label="Play metronome"
            title="Play metronome"
          >
            <span class="play-icon" aria-hidden="true">▶</span>
            <span class="stop-icon" aria-hidden="true">■</span>
          </button>
          <div class="song-row__manage">
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__up"
              aria-label="Move song up"
              title="Move up"
            >
              ↑
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__down"
              aria-label="Move song down"
              title="Move down"
            >
              ↓
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon btn--danger song-row__delete"
              aria-label="Remove song"
              title="Remove song"
            >
              ✕
            </button>
          </div>
          <button
            type="button"
            class="btn btn--ghost btn--icon song-row__done"
            aria-label="Mark song done"
            title="Mark done"
          >
            ✓
          </button>
        </div>
      </li>
    </template>

    <template id="break-row-template">
      <li class="song-row song-row--break" data-id="">
        <span class="song-row__num" aria-hidden="true">—</span>
        <input
          type="text"
          class="input song-row__title song-row__title--center"
          placeholder="Break"
          maxlength="120"
          aria-label="Break label"
        />
        <span class="song-row__title-text song-row__title-text--center"></span>
        <div class="song-row__actions song-row__actions--break">
          <button
            type="button"
            class="btn btn--ghost btn--icon song-row__done"
            aria-label="Mark break done"
            title="Mark done"
          >
            ✓
          </button>
          <div class="song-row__manage">
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__up"
              aria-label="Move break up"
              title="Move up"
            >
              ↑
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__down"
              aria-label="Move break down"
              title="Move down"
            >
              ↓
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon btn--danger song-row__delete"
              aria-label="Remove break"
              title="Remove break"
            >
              ✕
            </button>
          </div>
        </div>
      </li>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
