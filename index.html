<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>BPM List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <div class="header__title-row">
            <h1 id="gig-name-display" class="header__gig-name">Your Gig</h1>
            <input
              type="text"
              id="gig-name-input"
              class="header__gig-name-input"
              maxlength="80"
              aria-label="Gig name"
              hidden
            />
            <button
              type="button"
              id="edit-gig-name"
              class="edit-btn"
              aria-label="Rename gig"
              title="Rename gig"
            >
              <span class="pencil-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="header__tagline-row">
            <p id="gig-desc-display" class="header__tagline">
              Your gig setlist with tempo reference.
            </p>
            <input
              type="text"
              id="gig-desc-input"
              class="header__tagline-input"
              maxlength="120"
              aria-label="Gig description"
              hidden
            />
            <button
              type="button"
              id="edit-gig-desc"
              class="edit-btn edit-btn--desc"
              aria-label="Edit description"
              title="Edit description"
            >
              <span class="pencil-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <button
          type="button"
          id="theme-toggle"
          class="icon-btn"
          aria-label="Toggle light/dark mode"
          title="Toggle theme"
        >
          <span class="theme-icon theme-icon--light" aria-hidden="true">☀</span>
          <span class="theme-icon theme-icon--dark" aria-hidden="true">☾</span>
        </button>
      </header>

      <main>
        <div id="add-bar" class="add-bar">
          <form id="add-form" class="add-form" autocomplete="off">
            <input
              type="text"
              id="new-title"
              class="input"
              placeholder="Song title or break label"
              maxlength="120"
            />
            <input
              type="number"
              id="new-bpm"
              class="input input--bpm"
              placeholder="BPM"
              min="20"
              max="400"
              step="1"
            />
            <button type="submit" value="song" class="btn btn--primary">
              + Song
            </button>
            <button type="submit" value="break" class="btn btn--ghost">
              + Break
            </button>
          </form>
        </div>

        <div id="empty-state" class="empty-state" hidden>
          <p>No songs yet. Add your first tune above.</p>
        </div>

        <ul id="song-list" class="song-list" aria-label="Song list"></ul>
      </main>

      <footer class="footer">
        <p>
          <kbd>↑</kbd><kbd>↓</kbd> select song &middot; <kbd>Space</kbd> play/stop
          &middot; <kbd>T</kbd> tap tempo
        </p>
      </footer>
    </div>

    <template id="song-row-template">
      <li class="song-row" data-id="">
        <span class="song-row__num" aria-hidden="true"></span>
        <input
          type="text"
          class="input song-row__title"
          placeholder="Song title"
          maxlength="120"
          aria-label="Song title"
        />
        <div class="song-row__bpm-group">
          <input
            type="number"
            class="input input--bpm song-row__bpm"
            placeholder="BPM"
            min="20"
            max="400"
            step="1"
            aria-label="Beats per minute"
          />
          <button
            type="button"
            class="btn btn--ghost song-row__tap"
            title="Tap along to the song to detect tempo"
          >
            Tap
          </button>
        </div>
        <div class="song-row__actions">
          <button
            type="button"
            class="btn btn--play song-row__play"
            aria-label="Play metronome"
            title="Play metronome"
          >
            <span class="play-icon" aria-hidden="true">▶</span>
            <span class="stop-icon" aria-hidden="true">■</span>
          </button>
          <div class="song-row__manage">
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__up"
              aria-label="Move song up"
              title="Move up"
            >
              ↑
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__down"
              aria-label="Move song down"
              title="Move down"
            >
              ↓
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon btn--danger song-row__delete"
              aria-label="Remove song"
              title="Remove song"
            >
              ✕
            </button>
          </div>
        </div>
      </li>
    </template>

    <template id="break-row-template">
      <li class="song-row song-row--break" data-id="">
        <span class="song-row__num" aria-hidden="true">—</span>
        <input
          type="text"
          class="input song-row__title song-row__title--center"
          placeholder="Break"
          maxlength="120"
          aria-label="Break label"
        />
        <div class="song-row__actions song-row__actions--break">
          <div class="song-row__manage">
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__up"
              aria-label="Move break up"
              title="Move up"
            >
              ↑
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon song-row__down"
              aria-label="Move break down"
              title="Move down"
            >
              ↓
            </button>
            <button
              type="button"
              class="btn btn--ghost btn--icon btn--danger song-row__delete"
              aria-label="Remove break"
              title="Remove break"
            >
              ✕
            </button>
          </div>
        </div>
      </li>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
